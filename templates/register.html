{% extends "base.html" %}


{% block content %}

<br>
<form method="POST">
    <input
    type="text"
    name="username"
    placeholder="Create a username"
    /><br /> <br />

    <input
    type="text"
    name="email"
    placeholder="Enter your email"
    /><br /> <br />

    <input
    type="text"
    name="password"
    placeholder="Create a password"
    /><br /> <br />

    <input
    type="text"
    name="confirm_password"
    placeholder="Confirm your password"
    /><br /> <br />
    <button type="submit">Register</button>
</form>

{% endblock %}
